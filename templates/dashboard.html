<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Student Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { padding: 24px; }
    .table-card { max-width: 1000px; }
  </style>
</head>
<body>

  <div class="container table-card">
    <h2 class="mb-2">My Exam Dashboard</h2>
    <p class="text-muted">Welcome, {{ session.get('name', session.get('user','')) }}</p>

    <!-- Available Exams Section -->
    <div class="card mb-4">
      <div class="card-header bg-primary text-white">
        <h5 class="mb-0">Available Exams</h5>
      </div>
      <div class="card-body p-0">
        <table class="table table-bordered mb-0">
          <thead class="table-light">
            <tr>
              <th>Exam Name</th>
              <th>Duration (min)</th>
              <th>Total Marks</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="availableExamsTable">
            <tr><td colspan="4" class="text-center">Loading exams...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Past Results Section -->
    <h4 class="mb-2">Past Results</h4>
    <div class="card">
      <div class="card-body p-0">
        <table class="table table-bordered mb-0">
          <thead class="table-light">
            <tr>
              <th>Exam Name</th>
              <th>Allotted Time (min)</th>
              <th>Total Marks</th>
              <th>Score</th>
              <th>Status</th>
              <th>When</th>
            </tr>
          </thead>
          <tbody id="examTable">
            <tr><td colspan="6" class="text-center">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    window.STUDENT_ID = "{{ session.get('user','') }}";
  </script>
  <script type="module" src="{{ url_for('static', filename='dashboard.js') }}"></script>
</body>
</html>
