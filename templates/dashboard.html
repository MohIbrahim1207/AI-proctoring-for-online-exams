<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Student Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='proctor-theme.css') }}" rel="stylesheet">
</head>
<body class="proctor-ui">

  <div class="page-shell stagger">
    <header class="glass-header d-flex justify-content-between flex-wrap align-items-center gap-2">
      <div>
        <h2>My Exam Dashboard</h2>
        <p class="mb-0 text-white-50">Welcome, {{ session.get('name', session.get('user','')) }}</p>
      </div>
      <div class="d-flex gap-2">
        <span class="metric-chip">Proctoring: Enforced</span>
        <span class="metric-chip">Results: Live</span>
        <a href="/logout" class="btn btn-outline-light btn-sm">Logout</a>
      </div>
    </header>

    <section class="panel mb-4" id="activeAttemptSection" style="display:none;">
      <div class="panel-head d-flex justify-content-between align-items-center flex-wrap gap-2">
        <h5 class="mb-0">Active Test</h5>
      </div>
      <div class="panel-body" id="activeAttemptBody"></div>
    </section>

    <!-- Available Exams Section -->
    <section class="panel mb-4">
      <div class="panel-head">
        <h5 class="mb-0">Available Exams</h5>
      </div>
      <div class="panel-body p-0">
        <table class="table table-bordered proctor-table mb-0">
          <thead class="table-light">
            <tr>
              <th>Exam Name</th>
              <th>Duration (min)</th>
              <th>Total Marks</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="availableExamsTable">
            <tr><td colspan="4" class="text-center">Loading exams...</td></tr>
          </tbody>
        </table>
      </div>
    </section>

    <!-- Past Results Section -->
    <section class="panel">
      <div class="panel-head">
        <h5 class="mb-0">Past Results</h5>
      </div>
      <div class="panel-body p-0">
        <table class="table table-bordered proctor-table mb-0">
          <thead class="table-light">
            <tr>
              <th>Exam Name</th>
              <th>Allotted Time (min)</th>
              <th>Total Marks</th>
              <th>Score</th>
              <th>Status</th>
              <th>When</th>
            </tr>
          </thead>
          <tbody id="examTable">
            <tr><td colspan="6" class="text-center">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </div>

  <script>
    window.STUDENT_ID = "{{ session.get('user','') }}";
    window.CSRF_TOKEN = "{{ csrf_token }}";
  </script>
  <script type="module" src="{{ url_for('static', filename='dashboard.js') }}"></script>
</body>
</html>
