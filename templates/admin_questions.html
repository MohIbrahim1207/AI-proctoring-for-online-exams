<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin - Questions</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='proctor-theme.css') }}" rel="stylesheet">
</head>
<body class="proctor-ui">
  <div class="page-shell stagger">
    <header class="glass-header d-flex justify-content-between align-items-center flex-wrap gap-2">
      <h3>Question Bank Control</h3>
      <span class="metric-chip">Editor: Admin</span>
    </header>

    <section class="panel mb-3">
      <div class="panel-head">
        <h5 class="mb-0">Add or Update Question</h5>
      </div>
      <div class="panel-body">
      <form method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <div class="mb-3">
          <label class="form-label">Question ID</label>
          <input name="id" class="form-control" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Question Text</label>
          <input name="question" class="form-control" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Option A</label>
          <input name="opt1" class="form-control mb-2" required>
          <label class="form-label">Option B</label>
          <input name="opt2" class="form-control mb-2" required>
          <label class="form-label">Option C</label>
          <input name="opt3" class="form-control mb-2" required>
          <label class="form-label">Option D</label>
          <input name="opt4" class="form-control" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Correct Answer (exact option text)</label>
          <input name="answer" class="form-control" required>
        </div>
        <button class="btn btn-proctor">Add / Update Question</button>
      </form>
      </div>
    </section>

    <section class="panel">
      <div class="panel-head">
        <h5 class="mb-0">Existing Questions</h5>
      </div>
      <div class="panel-body">
      <ul class="list-group">
        {% for q in questions %}
        <li class="list-group-item">
          <strong>{{ q.id }}</strong> - {{ q.question }}
        </li>
        {% endfor %}
      </ul>
      </div>
    </section>
  </div>
</body>
</html>
