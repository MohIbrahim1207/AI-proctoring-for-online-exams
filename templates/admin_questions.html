<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin - Questions</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>.opt { margin-bottom:8px; }</style>
</head>
<body class="p-4">
  <div class="container">
    <h3>Manage Questions</h3>
    <div class="card p-3 mb-3">
      <form method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <div class="mb-2">
          <label class="form-label">Question ID</label>
          <input name="id" class="form-control" required>
        </div>
        <div class="mb-2">
          <label class="form-label">Question Text</label>
          <input name="question" class="form-control" required>
        </div>
        <div class="mb-2">
          <label class="form-label">Option A</label>
          <input name="opt1" class="form-control opt" required>
          <label class="form-label">Option B</label>
          <input name="opt2" class="form-control opt" required>
          <label class="form-label">Option C</label>
          <input name="opt3" class="form-control opt" required>
          <label class="form-label">Option D</label>
          <input name="opt4" class="form-control opt" required>
        </div>
        <div class="mb-2">
          <label class="form-label">Correct Answer (exact option text)</label>
          <input name="answer" class="form-control" required>
        </div>
        <button class="btn btn-primary">Add / Update Question</button>
      </form>
    </div>

    <div class="card p-3">
      <h5>Existing Questions</h5>
      <ul class="list-group">
        {% for q in questions %}
        <li class="list-group-item">
          <strong>{{ q.id }}</strong> - {{ q.question }}
        </li>
        {% endfor %}
      </ul>
    </div>
  </div>
</body>
</html>
