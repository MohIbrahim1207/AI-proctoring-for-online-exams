<!doctype html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Register</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='proctor-theme.css') }}" rel="stylesheet">
</head>

<body class="proctor-ui">
  <div class="auth-wrap">
    <div class="auth-card stagger">
      <aside class="auth-brand">
        <h2 class="mb-3">Create Proctored Account</h2>
        <p class="mb-4">Join the exam platform with continuous integrity monitoring and verified test sessions.</p>
        <div class="signal-grid">
          <div class="signal">Secure Enrollment</div>
          <div class="signal">Role Based Access</div>
          <div class="signal">Exam Analytics</div>
        </div>
      </aside>

      <section class="auth-form">
        <h4 class="mb-3">Register</h4>
        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}
        <form method="post">
          <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
          <div class="mb-3">
            <label class="form-label">Full name</label>
            <input name="name" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input name="email" type="email" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input name="password" type="password" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Role</label>
            <select name="role" class="form-select">
              <option value="student">Student</option>
              <option value="teacher">Teacher</option>
            </select>
          </div>
          <button class="btn btn-proctor w-100">Register</button>
        </form>
        <div class="mt-3 text-center">
          <a href="/">Back to login</a>
        </div>
      </section>
    </div>
  </div>
</body>

</html>
