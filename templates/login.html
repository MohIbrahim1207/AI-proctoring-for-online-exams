<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login | Online Exam System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='proctor-theme.css') }}" rel="stylesheet">
</head>

<body class="proctor-ui">

<div class="auth-wrap">
    <div class="auth-card stagger">
        <aside class="auth-brand">
            <h2 class="mb-3">AI Proctor Suite</h2>
            <p class="mb-4">Live webcam analysis, behavior tracking, and secure exam sessions in one workflow.</p>
            <div class="signal-grid">
                <div class="signal">Face Tracking</div>
                <div class="signal">Audio Flags</div>
                <div class="signal">Tab Integrity</div>
            </div>
        </aside>

        <section class="auth-form">
            <h4 class="mb-3">Sign in to continue</h4>

            {% if error %}
            <div class="alert alert-danger">{{ error }}</div>
            {% endif %}

            <form method="post">
                <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" id="email" name="email" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" id="password" name="password" class="form-control" required>
                </div>

                <button type="submit" class="btn btn-proctor w-100">
                    Login
                </button>
            </form>

            <div class="mt-3 text-center">
                <a href="/register">Create an account</a>
            </div>
        </section>
    </div>
</div>

</body>
</html>
